<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="One more Kilo!"/>
<meta name="theme-color" content="#0f0f0f" id="meta-theme-color"/>
<title>Routines — One more Kilo!</title>
<script>
// Runs before CSS paints so there's no flash of the wrong theme
(function () {
  var mode = localStorage.getItem('wk_thememode') || 'auto';
  var accent = localStorage.getItem('wk_accent') || 'green';
  var effective = mode === 'auto' ? ((window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark') : mode;
  document.documentElement.setAttribute('data-theme', effective);
  document.documentElement.setAttribute('data-accent', accent);
})();
</script>
<link rel="stylesheet" href="css/app.css"/>
</head>
<body>
<div class="app">
  <div class="header">
    <div><h1>Routines</h1><div class="header-sub" id="header-sub">Ectomorph mass builder</div></div>
    <div class="header-account" id="header-account">
      <button class="header-account-btn" id="header-account-btn" onclick="headerAccountClick()">Log in</button>
    </div>
  </div>
  <div class="scroll">
    <div class="section active">
      <div class="section-heading">My routines</div>
      <div id="my-routines"></div>
      <div id="routine-builder" style="margin-top:12px"></div>

      <div class="section-heading" style="margin-top:20px">Recommended plans</div>
      <div class="info-body" style="margin-bottom:12px">The built-in body-type programs. Pick one and how many days a week you can train.</div>
      <div id="template-plans"></div>
    </div>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="js/data.js"></script>
<script src="js/theme.js"></script>
<script src="js/storage.js"></script>
<script src="js/cloud.js"></script>
<script src="js/overlays.js"></script>
<script src="js/profileui.js"></script>
<script src="js/cards.js"></script>
<script src="js/plan.js"></script>
<script src="js/routines.js"></script>
<script src="js/init.js"></script>
</body>
</html>
