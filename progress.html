<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="One more Kilo!"/>
<meta name="theme-color" content="#0f0f0f" id="meta-theme-color"/>
<title>Progress — One more Kilo!</title>
<script>
// Runs before CSS paints so there's no flash of the wrong theme
(function () {
  var mode = localStorage.getItem('wk_thememode') || 'auto';
  var accent = localStorage.getItem('wk_accent') || 'green';
  var effective = mode === 'auto' ? ((window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark') : mode;
  document.documentElement.setAttribute('data-theme', effective);
  document.documentElement.setAttribute('data-accent', accent);
})();
</script>
<link rel="stylesheet" href="css/app.css"/>
</head>
<body>
<div class="app">
  <div class="header">
    <div><h1>Progress</h1><div class="header-sub" id="header-sub">Ectomorph mass builder</div></div>
    <div class="header-account" id="header-account">
      <button class="header-account-btn" id="header-account-btn" onclick="headerAccountClick()">Log in</button>
    </div>
  </div>
  <div class="scroll">
    <div class="section active">
      <div class="info-card" id="progress-header"></div>

      <div class="seg" id="progress-seg" style="margin:14px 0">
        <button data-view="log" onclick="setProgressView('log')" class="active">Workout log</button>
        <button data-view="charts" onclick="setProgressView('charts')">Charts</button>
      </div>

      <div id="progress-log">
        <div class="info-card" id="cal-card"></div>
        <div class="section-heading" style="margin-top:16px">Recent activity</div>
        <div id="activity-list"></div>
      </div>

      <div id="progress-charts" hidden>
        <div class="info-card">
          <div class="info-title">Body weight</div>
          <div id="chart-weight"></div>
        </div>
        <div class="info-card">
          <div class="info-title">Lift progress <span class="info-body">(best set weight per day)</span></div>
          <select id="chart-ex-select" class="auth-input" onchange="setChartExercise(this.value)" style="margin:8px 0"></select>
          <div id="chart-exercise"></div>
        </div>
        <div class="info-card">
          <div class="info-title">Training days per week</div>
          <div id="chart-weeks"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="js/data.js"></script>
<script src="js/theme.js"></script>
<script src="js/storage.js"></script>
<script src="js/cloud.js"></script>
<script src="js/overlays.js"></script>
<script src="js/profileui.js"></script>
<script src="js/cards.js"></script>
<script src="js/plan.js"></script>
<script src="js/charts.js"></script>
<script src="js/routines.js"></script>
<script src="js/init.js"></script>
</body>
</html>
